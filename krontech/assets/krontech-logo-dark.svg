<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ring1 { transform-origin: 50px 50px; animation: spinR 18s linear infinite; }
      .ring2 { transform-origin: 50px 50px; animation: spinL 28s linear infinite; }
      .ring3 { transform-origin: 50px 50px; animation: spinR 40s linear infinite; }
      .kt    { animation: breathe 4s ease-in-out infinite; }
      .orb   { animation: orbpulse 3s ease-in-out infinite; }
      @keyframes spinR   { to { transform: rotate(360deg); } }
      @keyframes spinL   { to { transform: rotate(-360deg); } }
      @keyframes breathe { 0%,100% { opacity:.75; } 50% { opacity:1; } }
      @keyframes orbpulse{ 0%,100% { opacity:.4; } 50% { opacity:1; } }
    </style>
  </defs>

  <!-- Símbolo -->
  <g transform="translate(0,0)">
    <circle class="ring3" cx="50" cy="50" r="47" fill="none" stroke="#2A2A2A" stroke-width="0.6" stroke-dasharray="3 9"/>
    <circle class="ring1" cx="50" cy="50" r="40" fill="none" stroke="#3A3A3A" stroke-width="0.8" stroke-dasharray="5 6"/>
    <circle class="ring2" cx="50" cy="50" r="32" fill="none" stroke="#FF6B2B" stroke-width="0.5" stroke-dasharray="2 7" opacity="0.4"/>
    <circle cx="50" cy="50" r="24" fill="#141414" stroke="#FF6B2B" stroke-width="0.9"/>
    <g class="kt" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="37" y1="36" x2="37" y2="64" stroke="#FFFFFF" stroke-width="1.6"/>
      <line x1="37" y1="50" x2="49" y2="36" stroke="#FFFFFF" stroke-width="1.6"/>
      <line x1="37" y1="50" x2="50" y2="64" stroke="#FFFFFF" stroke-width="1.6"/>
      <line x1="55" y1="36" x2="68" y2="36" stroke="#FF6B2B" stroke-width="1.6"/>
      <line x1="61.5" y1="36" x2="61.5" y2="64" stroke="#FF6B2B" stroke-width="1.6"/>
    </g>
    <line x1="52" y1="38" x2="52" y2="62" stroke="#2A2A2A" stroke-width="0.7"/>
    <circle class="orb" cx="50" cy="3"  r="2.5" fill="#FF6B2B" style="animation-delay:0s"/>
    <circle class="orb" cx="97" cy="50" r="2.5" fill="#888888" style="animation-delay:1s"/>
    <circle class="orb" cx="50" cy="97" r="2.5" fill="#FF6B2B" style="animation-delay:2s"/>
    <circle class="orb" cx="3"  cy="50" r="2.5" fill="#555555" style="animation-delay:1.5s"/>
  </g>

  <!-- Wordmark -->
  <text x="112" y="57" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Kron</text>
  <text x="195" y="57" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="200" fill="#FF6B2B" letter-spacing="-1">Tech</text>
  <text x="113" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#555555" letter-spacing="3">v1.0  ·  2026</text>
</svg>
